<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Application Development I</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./index.css">
    <script src="./index.json" defer></script>
    <script src="./index.js" defer></script>
</head>

<body>
    <div class="page-shell">
        <header class="header">
            <div class="brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path
                            d="M6 4h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Zm0 2v12h12V6H6Zm3 3h6v2H9V9Zm0 4h6v2H9v-2Z" />
                    </svg>
                </div>
                <div class="brand-title">
                    <p class="title">Modern Application Development I</p>
                    <p class="subtitle">All assignment files for <strong>Diploma Level</strong> course preparation.</p>
                </div>
            </div>
            <button id="refreshButton" class="button" type="button">Refresh data</button>
        </header>

        <div class="assessment-top-info">
            Dashboard scans and displays all <code>.html</code> assignment files found in the
            <code>sol</code> and <code>src</code> directories as a nested folder tree.
        </div>

        <section class="summary-grid" id="overviewGrid"></section>

        <section class="filter-panel">
            <div class="field">
                <label for="search">Search assignments</label>
                <input id="search" type="text" placeholder="Search by filename, week, or source…">
            </div>
            <div class="field">
                <label for="typeFilter">Source</label>
                <select id="typeFilter">
                    <option value="all">All sources</option>
                    <option value="src">src</option>
                    <option value="sol">sol</option>
                </select>
            </div>
            <div class="field">
                <label for="weekFilter">Week</label>
                <select id="weekFilter">
                    <option value="all">All weeks</option>
                </select>
            </div>
        </section>

        <div id="treeContainer"></div>
    </div>
</body>

</html>
